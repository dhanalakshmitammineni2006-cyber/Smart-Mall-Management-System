<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>
    <h2>Edit Product</h2>

    <form method="POST">
        <label>Name:</label><br>
        <input type="text" name="name" value="{{product[1]}}" required><br><br>

        <label>Price:</label><br>
        <input type="number" name="price" value="{{product[2]}}" required><br><br>

        <label>Size:</label><br>
        <input type="text" name="size" value="{{product[3]}}" required><br><br>

        <button type="submit">Update</button>
    </form>

    <br>
    <a href="/view">Back</a>
</body>
</html>
